<div class="flex flex-col gap-3">
  <h4 class="text-sm font-semibold text-black/80">{{ titulo | translate }}</h4>

  <!-- Lista de observaciones -->
  <div class="flex flex-col gap-2 max-h-64 overflow-y-auto pr-1">
    <div *ngFor="let obs of observaciones"
         class="rounded-lg border border-black/8 bg-white p-3 text-sm">
      <div class="flex items-center justify-between mb-1">
        <span class="font-medium text-sga text-xs">{{ obs.autor }}</span>
        <span class="text-xs text-black/50">{{ obs.fecha }}</span>
      </div>
      <div class="flex items-center gap-2 mb-1">
        <span class="sga-chip st-ejecucion text-[10px] h-[18px] min-w-0 px-2">
          {{ 'ROLES.' + obs.rolAutor | translate }}
        </span>
      </div>
      <p class="text-black/70 leading-relaxed text-[13px]">{{ obs.texto }}</p>
    </div>

    <div *ngIf="observaciones.length === 0" class="text-center text-black/40 text-sm py-4">
      {{ 'DETALLE.SIN_OBSERVACIONES' | translate }}
    </div>
  </div>

  <!-- Campo para nueva observación -->
  <div *ngIf="!readOnly" class="flex gap-2 mt-1">
    <mat-form-field appearance="outline" class="flex-1 sga-no-notch-textarea">
      <textarea matInput
                [(ngModel)]="textoNuevo"
                [placeholder]="'DETALLE.ESCRIBIR_OBSERVACION' | translate"
                rows="2"></textarea>
    </mat-form-field>
    <button mat-flat-button color="primary" class="h-11 self-end rounded-lg"
            [disabled]="!textoNuevo.trim()"
            (click)="enviar()">
      {{ 'ACTIONS.ENVIAR' | translate }}
    </button>
  </div>
</div>
