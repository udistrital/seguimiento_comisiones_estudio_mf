<div class="flex flex-col gap-3">
  <div class="flex items-center justify-between">
    <h4 class="text-sm font-semibold text-black/80">{{ titulo | translate }}</h4>
    <button *ngIf="permitirCarga" mat-stroked-button class="h-9 rounded-lg border-sga/30 text-sga text-sm">
      <mat-icon class="text-[18px] mr-1">upload_file</mat-icon>
      {{ 'ACTIONS.ADJUNTAR' | translate }}
    </button>
  </div>

  <div class="rounded-xl border-2 border-sga overflow-hidden bg-white doc-table">
    <div class="h-2 bg-gradient-to-r from-sga to-sga/60" aria-hidden="true"></div>

    <table mat-table [dataSource]="documentos" class="w-full bg-white">

      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef class="doc-th text-sga font-semibold">
          {{ 'DETALLE.DOCUMENTO_NOMBRE' | translate }}
        </th>
        <td mat-cell *matCellDef="let doc" class="doc-td text-black/75 text-sm">
          {{ doc.nombre }}
        </td>
      </ng-container>

      <ng-container matColumnDef="autorSoporte">
        <th mat-header-cell *matHeaderCellDef class="doc-th text-sga font-semibold">
          {{ 'DETALLE.AUTOR_SOPORTE' | translate }}
        </th>
        <td mat-cell *matCellDef="let doc" class="doc-td text-black/75 text-sm">
          {{ doc.autorSoporte || '-' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="estado">
        <th mat-header-cell *matHeaderCellDef class="doc-th text-sga font-semibold">
          {{ 'TABLE.ESTADO' | translate }}
        </th>
        <td mat-cell *matCellDef="let doc" class="doc-td">
          <span class="sga-chip" [ngClass]="getEstadoClass(doc)">
            {{ 'DOC_ESTADOS.' + doc.estado | translate }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef class="doc-th text-sga font-semibold">
          {{ 'TABLE.GESTION' | translate }}
        </th>
        <td mat-cell *matCellDef="let doc" class="doc-td">
          <div class="flex items-center justify-center gap-1">
            <button type="button" class="sga-table-action sga-table-action--primary"
                    [matTooltip]="'ACTIONS.VER' | translate"
                    (click)="onVer(doc)"
                    [disabled]="doc.estado === 'PENDIENTE' || doc.cargandoArchivo">
              <mat-icon *ngIf="!doc.cargandoArchivo">visibility</mat-icon>
              <div *ngIf="doc.cargandoArchivo"
                   class="w-4 h-4 border-2 border-sga/30 border-t-sga rounded-full animate-spin">
              </div>
            </button>
            <button *ngIf="permitirCarga && doc.estado === 'PENDIENTE'"
                    type="button" class="sga-table-action sga-table-action--primary"
                    [matTooltip]="'ACTIONS.CARGAR' | translate"
                    (click)="onCargar(doc)">
              <mat-icon>cloud_upload</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
</div>
