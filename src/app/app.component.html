<mat-card style="margin: 16px;">
  <div style="display:flex; gap: 16px; align-items:center; flex-wrap: wrap;">
    <div style="flex: 1 1 auto;">
      <h2 style="margin:0;">{{ title }}</h2>
      <p style="margin: 4px 0 0; opacity: .75;">
        Seleciona un rol para ver las acciones permitidas (demo).
      </p>
    </div>

    <mat-form-field appearance="outline" style="min-width: 320px;">
      <mat-label>Rol (demo)</mat-label>
      <mat-select [value]="selectedRole" (selectionChange)="onRoleChange($event.value)">
        <mat-option *ngFor="let r of roleOptions" [value]="r.value">
          {{ r.label }}
        </mat-option>
      </mat-select>
    </mat-form-field>
  </div>
</mat-card>

<mat-card style="margin: 16px; overflow: auto;">
  <table mat-table [dataSource]="rows" class="mat-elevation-z1" style="width: 100%; min-width: 900px;">

    <!-- Columnas dinámicas -->
    <ng-container *ngFor="let col of columnDefs" [matColumnDef]="col.key">
      <th mat-header-cell *matHeaderCellDef>{{ col.header }}</th>

      <td mat-cell *matCellDef="let row">
        <ng-container [ngSwitch]="col.key">
          <mat-chip *ngSwitchCase="'estado'" [ngClass]="estadoClass(row.estado)">
            {{ col.cell(row) }}
          </mat-chip>

          <span *ngSwitchDefault>
            {{ col.cell(row) }}
          </span>
        </ng-container>
      </td>
    </ng-container>

    <!-- Columna de acciones -->
    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>

      <td mat-cell *matCellDef="let row" style="white-space: nowrap;">
        <!-- Siempre -->
        <button mat-stroked-button (click)="onAction('VER', row)" style="margin-right: 8px;">
          Ver
        </button>

        <!-- Docente -->
        <button
          *ngIf="can('EDITAR', row)"
          mat-stroked-button
          (click)="onAction('EDITAR', row)"
          style="margin-right: 8px;">
          Editar
        </button>

        <button
          *ngIf="can('ENVIAR', row)"
          mat-flat-button
          (click)="onAction('ENVIAR', row)"
          style="margin-right: 8px;">
          Enviar
        </button>

        <!-- Revisor (coordinación/secretaría/supervisor) -->
        <button
          *ngIf="can('REVISAR', row)"
          mat-stroked-button
          (click)="onAction('REVISAR', row)"
          style="margin-right: 8px;">
          Revisar docs
        </button>

        <button
          *ngIf="can('RETORNAR', row)"
          mat-stroked-button
          (click)="onAction('RETORNAR', row)"
          style="margin-right: 8px;">
          Retornar
        </button>

        <button
          *ngIf="can('AVALAR', row)"
          mat-flat-button
          (click)="onAction('AVALAR', row)">
          Avalar
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</mat-card>
